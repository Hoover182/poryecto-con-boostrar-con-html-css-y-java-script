<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSoft Short</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page { display: none; }
        .active { display: block; }
        .bg-agro { background: #2e7d33 !important; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-agro mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold">🌱 AgroSoft</span>
        <button class="btn btn-sm btn-outline-light" onclick="location.reload()">Salir</button>
    </div>
</nav>

<div class="container">
    <div id="p-login" class="page active">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow p-4 mt-5 text-center">
                <h3 class="mb-3">Entrar</h3>
                <select id="role" class="form-select mb-3">
                    <option value="user">Soy Agricultor</option>
                    <option value="admin">Soy Administrador</option>
                </select>
                <button class="btn btn-success w-100" onclick="login()">Ingresar</button>
            </div>
        </div>
    </div>

    <div id="p-home" class="page">
        <div class="d-flex justify-content-between mb-3">
            <h4>Enfermedades Girardot</h4>
            <button id="adminBtn" class="btn btn-primary d-none" onclick="go('p-add')">+ Nueva</button>
        </div>
        <div id="list" class="row g-3"></div>
    </div>

    <div id="p-add" class="page mt-3">
        <div class="card p-4 mx-auto" style="max-width: 500px;">
            <h5>Nueva Enfermedad</h5>
            <input type="text" id="n-name" class="form-control mb-2" placeholder="Nombre">
            <input type="text" id="n-plant" class="form-control mb-2" placeholder="Planta">
            <textarea id="n-desc" class="form-control mb-3" placeholder="Síntomas"></textarea>
            <div class="d-flex gap-2">
                <button class="btn btn-success flex-grow-1" onclick="save()">Guardar</button>
                <button class="btn btn-secondary" onclick="go('p-home')">Volver</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Datos base
    let data = [
        { n: "Antracnosis", p: "Mango", d: "Manchas negras y frutos podridos." },
        { n: "Sigatoka", p: "Plátano", d: "Hojas amarillas y marchitas." }
    ];

    // Navegación
    function go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'p-home') render();
    }

    function login() {
        if(document.getElementById('role').value === 'admin') {
            document.getElementById('adminBtn').classList.remove('d-none');
        }
        go('p-home');
    }

    // Lógica
    function render() {
        const box = document.getElementById('list');
        box.innerHTML = data.map(e => `
            <div class="col-12 col-md-6">
                <div class="card p-3 h-100 shadow-sm border-start border-success border-4">
                    <h6 class="fw-bold text-success">${e.n}</h6>
                    <p class="small text-muted mb-1">🌱 ${e.p}</p>
                    <p class="small m-0">${e.d}</p>
                </div>
            </div>
        `).join('');
    }

    function save() {
        const n = document.getElementById('n-name').value;
        const p = document.getElementById('n-plant').value;
        const d = document.getElementById('n-desc').value;

        if(n && p) {
            data.push({ n, p, d });
            alert("Registrado.");
            go('p-home');
        } else {
            alert("Llena los campos.");
        }
    }
</script>

</body>
</html>
